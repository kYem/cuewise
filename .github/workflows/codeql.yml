name: CodeQL

# Advanced CodeQL setup (replaces GitHub's default setup) so we can path-gate the
# slow, compiled languages. JS/TS + Actions need no build and run on every PR; Swift
# (macOS runner) and Rust only analyze when apps/macos changes. A weekly scan keeps
# native code covered between changes.
#
# NOTE: default CodeQL setup must be turned OFF in Settings -> Code security, or both
# run and the required checks double up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC — full scan

permissions:
  contents: read

jobs:
  # Decide whether the native (Swift/Rust) builds need to run for this PR.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect native (Swift/Rust) changes
        id: filter
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git diff --name-only "$BASE_SHA"...HEAD | grep -qE '^apps/macos/'; then
            echo "native=true" >> "$GITHUB_OUTPUT"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: changes
    # Native languages only when apps/macos changed on a PR; always on push/schedule.
    if: ${{ !matrix.native || github.event_name != 'pull_request' || needs.changes.outputs.native == 'true' }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          - language: rust
            build-mode: autobuild
            runner: ubuntu-latest
            native: true
          - language: swift
            build-mode: autobuild
            runner: macos-latest
            native: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: /language:${{ matrix.language }}
