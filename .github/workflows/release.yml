name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip release creation and Chrome publish)'
        required: false
        default: false
        type: boolean
      publish_chrome:
        description: 'Publish to Chrome Web Store'
        required: false
        default: false
        type: boolean

# Least privilege by default; each job escalates only what it needs.
permissions:
  contents: read

# Disable build-tool telemetry so nothing phones home from CI
# (Turbo -> telemetry.vercel.com, Astro -> telemetry.astro.build).
env:
  DO_NOT_TRACK: '1'
  TURBO_TELEMETRY_DISABLED: '1'
  ASTRO_TELEMETRY_DISABLED: '1'

jobs:
  build:
    name: Build and Test
    # Releases only ever run from main.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # provenance attestation (Sigstore OIDC + upload)
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Harden runner
        # Block egress (builds + attests the published artifact).
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm type-check

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm --filter @cuewise/browser-extension test

      - name: Build all packages
        run: pnpm build

      - name: Build extension zip
        run: pnpm release:extension

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/browser-extension/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: apps/browser-extension/build/cuewise-extension-${{ steps.version.outputs.version }}.zip

      - name: Upload extension zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cuewise-extension-${{ steps.version.outputs.version }}
          path: apps/browser-extension/build/cuewise-extension-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        # Block egress (creates the GitHub release).
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443

      # Checkout is needed only for the CHANGELOG used as the release body.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: apps/browser-extension/CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download extension zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cuewise-extension-${{ needs.build.outputs.version }}
          path: dist-artifact

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "v${{ needs.build.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: ${{ steps.check_release.outputs.exists == 'false' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Cuewise v${{ needs.build.outputs.version }}
          body_path: apps/browser-extension/CHANGELOG.md
          files: dist-artifact/cuewise-extension-${{ needs.build.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Chrome Web Store
    needs: build
    if: ${{ inputs.publish_chrome && !inputs.dry_run }}
    runs-on: ubuntu-latest
    # The CWS tokens live ONLY in this environment. Add a required reviewer to
    # the `chrome-web-store` environment so a human must approve every publish.
    environment: chrome-web-store
    permissions:
      contents: read
    steps:
      - name: Harden runner
        # Block egress (holds the store tokens).
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            oauth2.googleapis.com:443
            www.googleapis.com:443

      # Only the first-party publish script is needed — no install, no tsx, so no
      # dependency code ever runs in the job that holds the secrets.
      - name: Checkout publish script
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: scripts/publish-chrome.mts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Download extension zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cuewise-extension-${{ needs.build.outputs.version }}
          path: apps/browser-extension/build

      - name: Publish to Chrome Web Store
        env:
          # Extension ID and Client ID are non-sensitive, stored as variables
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ vars.CHROME_CLIENT_ID }}
          # Client Secret and Refresh Token are sensitive, stored as environment secrets
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: node scripts/publish-chrome.mts "apps/browser-extension/build/cuewise-extension-${{ needs.build.outputs.version }}.zip"

  summary:
    name: Summary
    needs: [build, release, publish]
    # Run even if release/publish were skipped (dry run or publish disabled).
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "**Version:** v${{ needs.build.outputs.version }}"
            echo "**Dry Run:** ${{ inputs.dry_run }}"
            echo "**Chrome Publish:** ${{ inputs.publish_chrome }}"
            echo "**Release job:** ${{ needs.release.result }}"
            echo "**Publish job:** ${{ needs.publish.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
