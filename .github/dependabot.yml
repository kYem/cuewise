version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the SHA and the
  # trailing version comment together, so pinning stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'
