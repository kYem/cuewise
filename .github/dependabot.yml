version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the SHA and the
  # trailing version comment together, so pinning stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'

  # npm/pnpm version updates are managed manually via the pnpm catalog
  # (pnpm-workspace.yaml). Dependabot SECURITY updates still run via the repo's
  # security settings — only the routine weekly version bumps are turned off here.
