version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the SHA and the
  # trailing version comment together, so pinning stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'

  # npm/pnpm deps; one root entry covers the whole workspace.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'
