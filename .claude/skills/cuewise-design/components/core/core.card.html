<!-- @dsCard group="Components" viewport="700x440" name="Core primitives" subtitle="Button · IconButton · CategoryBadge · Toggle · Card · StatCard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--gradient-background); padding: 26px 30px; font-family: var(--font-sans); }
  .sec { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-tertiary); margin: 0 0 11px; }
  .block { margin-bottom: 22px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  /* Button */
  .btn { display:inline-flex; align-items:center; gap:0.5rem; font-weight:500; font-size:0.9375rem; padding:0.6rem 1.1rem; border-radius:var(--radius-md); border:1px solid transparent; cursor:pointer; }
  .btn.primary { background:var(--color-primary-600); color:#fff; box-shadow:var(--shadow-md); }
  .btn.secondary { background:var(--color-surface); color:var(--color-text-primary); border-color:var(--color-border); box-shadow:var(--shadow-sm); }
  .btn.ghost { background:transparent; color:var(--color-text-secondary); }
  .btn.danger { background:var(--color-error); color:#fff; box-shadow:var(--shadow-md); }
  .btn.pill { border-radius:var(--radius-full); }
  /* IconButton */
  .ib { display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:var(--radius-full); border:none; box-shadow:var(--shadow-md); cursor:pointer; background:rgba(255,255,255,0.6); backdrop-filter:blur(6px); color:var(--color-text-primary); }
  .ib.primary { background:var(--color-primary-600); color:#fff; }
  .ib.fav { background:var(--color-error); color:#fff; }
  /* badge */
  .badge { display:inline-flex; align-items:center; color:#fff; font-weight:600; font-size:0.8125rem; padding:0.25rem 0.75rem; border-radius:var(--radius-full); box-shadow:var(--shadow-sm); }
  /* toggle */
  .tog { position:relative; width:44px; height:24px; border:none; border-radius:var(--radius-full); cursor:pointer; }
  .tog .knob { position:absolute; top:3px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:var(--shadow-sm); }
  /* card */
  .card { background:var(--color-surface-elevated); border:1px solid var(--color-border); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:1.1rem 1.3rem; }
  /* statcard */
  .stat { background:var(--color-surface-elevated); border:1px solid var(--color-border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:1rem 1.2rem; min-width:170px; }
  .stat .top { display:flex; align-items:flex-start; justify-content:space-between; }
  .chip { display:inline-flex; padding:0.5rem; border-radius:var(--radius-md); }
  .stat .val { font-family:var(--font-display); font-weight:700; font-size:1.9rem; line-height:1; }
  .stat .lbl { margin-top:0.75rem; font-weight:600; font-size:0.875rem; color:var(--color-text-primary); }
  .stat .sub { margin-top:0.15rem; font-size:0.72rem; color:var(--color-text-tertiary); }
  svg { stroke-width:2; }
</style>
</head>
<body>
  <div class="block">
    <p class="sec">Button</p>
    <div class="row">
      <button class="btn primary"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-6.2-8.5"/><path d="M21 3v6h-6"/></svg>New Quote</button>
      <button class="btn secondary pill"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>Add</button>
      <button class="btn ghost">Show Incomplete</button>
      <button class="btn danger">Delete</button>
    </div>
  </div>

  <div class="row" style="gap:34px; align-items:flex-start;">
    <div class="block" style="margin:0;">
      <p class="sec">Icon Button</p>
      <div class="row">
        <button class="ib"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <button class="ib fav"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>
        <button class="ib primary"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-6.2-8.5"/><path d="M21 3v6h-6"/></svg></button>
      </div>
    </div>
    <div class="block" style="margin:0;">
      <p class="sec">Category Badge</p>
      <div class="row">
        <span class="badge" style="background:var(--category-creativity)">Creativity</span>
        <span class="badge" style="background:var(--category-success)">Success</span>
        <span class="badge" style="background:var(--category-leadership)">Leadership</span>
      </div>
    </div>
    <div class="block" style="margin:0;">
      <p class="sec">Toggle</p>
      <div class="row">
        <button class="tog" style="background:var(--color-primary-600)"><span class="knob" style="left:23px"></span></button>
        <button class="tog" style="background:var(--color-border)"><span class="knob" style="left:3px"></span></button>
      </div>
    </div>
  </div>

  <div class="row" style="gap:18px; align-items:stretch; margin-top:8px;">
    <div class="block" style="margin:0; flex:1;">
      <p class="sec">Card</p>
      <div class="card">
        <div style="font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--color-text-primary);">Today's Focus</div>
        <div style="font-size:0.8125rem; color:var(--color-text-secondary); margin-top:2px;">What matters most today?</div>
      </div>
    </div>
    <div class="block" style="margin:0;">
      <p class="sec">Stat Card</p>
      <div class="stat">
        <div class="top">
          <span class="chip" style="background:color-mix(in srgb, var(--color-warning) 20%, transparent)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-warning)"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          </span>
          <span class="val" style="color:var(--color-warning)">1</span>
        </div>
        <div class="lbl">Current Streak</div>
        <div class="sub">Longest: 1 days</div>
      </div>
    </div>
  </div>
</body>
</html>
