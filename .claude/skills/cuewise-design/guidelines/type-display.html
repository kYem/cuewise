<!-- @dsCard group="Type" viewport="700x300" name="Display & Headings" subtitle="Poppins — clock, hero, titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--color-surface); padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--color-divider); }
  .row:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-tertiary); width: 130px; flex-shrink: 0; letter-spacing: 0.02em; }
  .d { font-family: var(--font-display); color: var(--color-text-primary); line-height: 1.1; }
</style>
</head>
<body>
  <div class="row"><span class="spec">Clock · 72 / 800</span><span class="d" style="font-size:60px;font-weight:800;letter-spacing:-0.02em;">09:24</span></div>
  <div class="row"><span class="spec">Hero · 48 / 800</span><span class="d" style="font-size:40px;font-weight:800;">Meaningful Journey</span></div>
  <div class="row"><span class="spec">Page title · 36 / 700</span><span class="d" style="font-size:30px;font-weight:700;">Your Insights</span></div>
  <div class="row"><span class="spec">Section · 24 / 600</span><span class="d" style="font-size:22px;font-weight:600;">Today's Focus</span></div>
</body>
</html>
