<!-- @dsCard group="Glass" viewport="1280x900" -->
<!-- @startingPoint section="Cuewise" subtitle="Glass new-tab — frosted cards over a photo" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cuewise — Glass New Tab</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { min-height: 100%; background: #0f172a; }
  #root { min-height: 100vh; }

  .glass-root { position: relative; min-height: 100vh; overflow: hidden; background: #0f172a; }
  .bg-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .bg-scrim { position: absolute; inset: 0; z-index: 1; background: var(--glass-scrim); pointer-events: none; }
  .content { position: relative; z-index: 3; min-height: 100vh; padding: 28px 24px 70px; }

  /* Loader */
  .loader { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  .loader-chip { padding: 22px; border-radius: 22px; background: rgba(255,255,255,0.1); backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--shadow-2xl); animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .loader-text { display: inline-flex; align-items: baseline; gap: 1px; color: rgba(255,255,255,0.78); font-family: var(--font-sans); font-size: 15px; font-weight: 500; }
  .dot { animation: bd 1.4s ease-in-out infinite; }
  .d2 { animation-delay: 0.2s; } .d3 { animation-delay: 0.4s; }
  @keyframes bd { 0%,80%,100%{opacity:0.3;transform:translateY(0)} 40%{opacity:1;transform:translateY(-4px)} }

  /* Floating nav */
  .g-nav { position: absolute; top: 28px; right: 28px; left: 28px; display: flex; align-items: center; gap: 12px; z-index: 4; }
  .cat-switch { display: flex; gap: 4px; padding: 4px; border-radius: var(--radius-full); background: var(--glass-card);
    backdrop-filter: blur(var(--glass-blur)); border: 1px solid var(--glass-hairline); margin-right: auto; }
  .cat-pill { padding: 7px 15px; border: none; background: transparent; border-radius: var(--radius-full); color: rgba(255,255,255,0.7);
    font-family: var(--font-sans); font-size: 13px; font-weight: 600; transition: background var(--duration-fast) ease, color var(--duration-fast) ease; }
  .cat-pill:hover { color: #fff; }
  .cat-pill.on { background: rgba(255,255,255,0.9); color: #1b1530; }
  .g-pill { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border: 1px solid var(--glass-hairline); border-radius: var(--radius-full);
    background: var(--glass-card); backdrop-filter: blur(var(--glass-blur)); color: #fff; font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-md); transition: transform var(--duration-fast) ease; }
  .g-pill:hover, .g-circle:hover { transform: scale(1.05); }
  .g-circle { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border: 1px solid var(--glass-hairline);
    border-radius: var(--radius-full); background: var(--glass-card); backdrop-filter: blur(var(--glass-blur)); box-shadow: var(--shadow-md); }

  .g-center { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 36px; padding-top: 64px; }

  /* Clock */
  .clock-block { text-align: center; }
  .clock { font-family: var(--font-display); font-weight: 800; font-size: 78px; letter-spacing: -0.03em; color: #fff; line-height: 1; text-shadow: var(--glass-text-shadow); }
  .greeting { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: #fff; margin-top: 8px; text-shadow: var(--glass-text-shadow); }
  .date { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 2px; text-shadow: var(--glass-text-shadow); }

  /* Quote */
  .g-quote { width: 100%; text-align: center; }
  .badge-row { display: flex; justify-content: center; margin-bottom: 20px; }
  .cat-badge { color: #fff; font-weight: 600; font-size: 13px; padding: 5px 16px; border-radius: var(--radius-full); box-shadow: var(--shadow-md); }
  .qbody { opacity: 0; transform: translateY(6px); transition: opacity var(--duration-base) ease, transform var(--duration-base) ease; min-height: 140px;
    display: flex; flex-direction: column; justify-content: center; }
  .qbody.in { opacity: 1; transform: none; }
  .qtext { font-family: var(--font-display); font-weight: 600; line-height: 1.25; color: #fff; text-wrap: balance; text-shadow: var(--glass-text-shadow); }
  .qauthor { font-size: 21px; font-weight: 600; color: rgba(255,255,255,0.92); margin-top: 20px; text-shadow: var(--glass-text-shadow); }
  .qactions { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 22px; }
  .qa { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border: 1px solid var(--glass-hairline); border-radius: var(--radius-full);
    background: var(--glass-card); backdrop-filter: blur(var(--glass-blur)); color: #fff; box-shadow: var(--shadow-sm); transition: transform var(--duration-fast) ease; }
  .qa:hover { transform: scale(1.07); }
  .qa.pill { width: auto; gap: 8px; padding: 0 20px; height: 44px; font-weight: 600; font-size: 15px; font-family: var(--font-sans); }
  .qa.fav { background: var(--color-error); border-color: transparent; }

  /* Frosted focus card */
  .g-card { width: 100%; max-width: 560px; background: var(--glass-card); backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-hairline); border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); padding: 24px; }
  .g-card-head { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .g-chip { display: inline-flex; padding: 9px; border-radius: var(--radius-md); background: rgba(255,255,255,0.14); }
  .g-title { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: #fff; }
  .g-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 1px; }
  .g-input-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .g-input { flex: 1; padding: 12px 14px; border: 1px solid var(--glass-hairline); border-radius: var(--radius-md);
    background: rgba(255,255,255,0.08); color: #fff; font-family: var(--font-sans); font-size: 14px; outline: none; }
  .g-input::placeholder { color: rgba(255,255,255,0.55); }
  .g-input:focus { border-color: rgba(255,255,255,0.45); }
  .g-add { display: inline-flex; align-items: center; gap: 6px; padding: 0 18px; border: 1px solid var(--glass-hairline); border-radius: var(--radius-md);
    background: rgba(255,255,255,0.16); color: #fff; font-family: var(--font-sans); font-weight: 600; font-size: 14px; transition: background var(--duration-fast) ease; }
  .g-add:hover { background: rgba(255,255,255,0.26); }
  .g-prog-meta { display: flex; justify-content: space-between; font-size: 14px; color: rgba(255,255,255,0.78); margin-bottom: 8px; }
  .g-track { height: 8px; background: rgba(255,255,255,0.18); border-radius: var(--radius-full); overflow: hidden; margin-bottom: 16px; }
  .g-fill { height: 100%; background: rgba(255,255,255,0.92); border-radius: var(--radius-full); transition: width var(--duration-slow) var(--ease-out); }
  .g-tasks { display: flex; flex-direction: column; gap: 8px; }
  .g-task { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--glass-hairline); border-radius: var(--radius-md);
    background: rgba(255,255,255,0.06); text-align: left; color: #fff; font-size: 15px; transition: background var(--duration-fast) ease; }
  .g-task:hover { background: rgba(255,255,255,0.12); }
  .g-task.done { opacity: 0.6; }
  .g-task.done span { text-decoration: line-through; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../_lib/icons.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
