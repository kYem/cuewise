<!-- @dsCard group="Glass · Insights" viewport="1280x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cuewise — Insights</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { min-height: 100%; }
  body { background: var(--gradient-background); }
  #root { min-height: 100vh; }
  .insights { max-width: 1240px; margin: 0 auto; padding: 40px 32px 60px; }

  .ins-head { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .ins-chip { display: inline-flex; padding: 10px; border-radius: var(--radius-md); background: var(--color-primary-100); }
  .ins-title { font-family: var(--font-display); font-weight: 700; font-size: 34px; color: var(--color-text-primary); line-height: 1.1; }
  .ins-sub { font-size: 15px; color: var(--color-text-secondary); margin-top: 2px; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
  @media (max-width: 920px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--color-surface-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); padding: 22px 24px; }
  .stat-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .stat-chip { display: inline-flex; padding: 10px; border-radius: var(--radius-md); }
  .stat-val { font-family: var(--font-display); font-weight: 700; font-size: 34px; line-height: 1; }
  .stat-label { margin-top: 18px; font-weight: 600; font-size: 16px; color: var(--color-text-primary); }
  .stat-sub { margin-top: 3px; font-size: 13px; color: var(--color-text-tertiary); }

  .panel { background: var(--color-surface-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg); padding: 32px; margin-bottom: 28px; }
  .panel-head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .panel-title { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--color-text-primary); }
  .callout { background: var(--color-primary-50); border-radius: var(--radius-md); padding: 16px 18px; font-size: 14px;
    color: var(--color-text-secondary); margin-bottom: 24px; }
  .callout b { color: var(--color-primary-700); font-weight: 700; }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 40px; }
  @media (max-width: 760px) { .cat-grid { grid-template-columns: 1fr; } }
  .cat-row { display: flex; align-items: center; gap: 14px; }
  .cat-name { width: 110px; flex-shrink: 0; font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
  .cat-track { position: relative; flex: 1; height: 32px; background: var(--color-divider); border-radius: var(--radius-md); overflow: hidden; }
  .cat-fill { height: 100%; border-radius: var(--radius-md); transition: width var(--duration-slow) var(--ease-out); }
  .cat-count { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: 700; color: var(--color-text-primary); }

  .achieve { background: linear-gradient(120deg, var(--color-primary-600), var(--color-primary-500)); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg); padding: 36px 40px; color: #fff; }
  .achieve-title { font-family: var(--font-display); font-weight: 700; font-size: 26px; margin-bottom: 22px; }
  .achieve-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .ach-num { font-family: var(--font-display); font-weight: 800; font-size: 40px; line-height: 1; }
  .ach-lbl { margin-top: 8px; font-size: 15px; opacity: 0.9; }
</style>

  <style id="glass-skin">
    html, body { background: #0f172a !important; }
    body { position: relative; min-height: 100vh; }
    .gbg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .gscrim { position: fixed; inset: 0; z-index: 1; background: var(--glass-scrim); pointer-events: none; }
    #root { position: relative; z-index: 2; }
    /* frost the surfaces */
    .timer-card, .stat, .panel, .qcard, .search, .cat-select, .qa, .qm-stat,
    .callout, .ctrl-icon, .back-link, .status-pill, .qcard-top, .add-quote {
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    /* legible display text over photo */
    .ins-title, .qm-title, .tc-title, .clock, .greeting, .quote-text, .qtext,
    .panel-title, .achieve-title, .stat-val, .qm-sub, .ins-sub, .tc-sub, .quote-author {
      text-shadow: var(--glass-text-shadow);
    }
    /* keep primary actions readable (avoid white-on-white) */
    .add-quote { background: rgba(0,0,0,0.45) !important; border: 1px solid var(--glass-hairline); }
    .tab.active { background: rgba(255,255,255,0.92) !important; color: #1b1530 !important; }
    .tab:hover { background: rgba(255,255,255,0.12); }
    /* achievement banner: brand-violet glass instead of washed-out white */
    .achieve { background: linear-gradient(120deg, rgba(124,58,237,0.55), rgba(99,102,241,0.42)) !important;
      border: 1px solid var(--glass-hairline); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .callout { background: rgba(255,255,255,0.10) !important; }
    /* section icon chips read brighter on glass */
    .ins-chip, .head-chip, .g-chip { background: rgba(255,255,255,0.16) !important; }
  </style>
</head>
<body data-theme="glass">
  <img class="gbg" src="../../assets/bg-dusk.png" alt="" />
  <div class="gscrim"></div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../_lib/icons.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
