<!-- @dsCard group="New Tab" viewport="1280x900" -->
<!-- @startingPoint section="Cuewise" subtitle="New-tab home — clock, quote, goals, reminders" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cuewise — New Tab</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { min-height: 100%; }
  body { background: var(--gradient-background); }
  #root { min-height: 100vh; }

  .home { position: relative; min-height: 100vh; padding: 28px 24px 80px; }

  /* Floating chrome */
  .floating-nav { position: absolute; top: 28px; right: 28px; display: flex; align-items: center; gap: 10px; z-index: 40; }
  .pill-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border: none; border-radius: var(--radius-full);
    background: color-mix(in srgb, var(--color-surface) 80%, transparent); backdrop-filter: blur(6px); box-shadow: var(--shadow-md);
    font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--color-text-primary);
    transition: box-shadow var(--duration-fast) ease, transform var(--duration-fast) ease; }
  .pill-btn:hover, .icon-circle:hover { box-shadow: var(--shadow-lg); transform: scale(1.05); }
  .icon-circle { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border: none; border-radius: var(--radius-full);
    background: color-mix(in srgb, var(--color-surface) 80%, transparent); backdrop-filter: blur(6px); box-shadow: var(--shadow-md); color: var(--color-text-primary);
    transition: box-shadow var(--duration-fast) ease, transform var(--duration-fast) ease; }
  .obj-btn { position: absolute; top: 28px; left: 28px; z-index: 40; display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border: none; border-radius: var(--radius-full); background: color-mix(in srgb, var(--color-surface) 80%, transparent);
    backdrop-filter: blur(6px); box-shadow: var(--shadow-md); font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--color-text-primary);
    transition: box-shadow var(--duration-fast) ease, transform var(--duration-fast) ease; }
  .obj-btn:hover { box-shadow: var(--shadow-lg); transform: scale(1.04); }
  .obj-count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px;
    background: var(--color-primary-600); color: #fff; border-radius: var(--radius-full); font-size: 11px; font-weight: 700; }

  .center-col { max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 40px; padding-top: 36px; }

  /* Clock */
  .clock-block { text-align: center; }
  .clock { font-family: var(--font-display); font-weight: 800; font-size: 76px; letter-spacing: -0.03em; color: var(--color-text-primary); line-height: 1; }
  .greeting { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--color-text-primary); margin-top: 6px; }
  .date { font-size: 14px; color: var(--color-text-secondary); margin-top: 2px; }

  /* Quote */
  .quote-wrap { width: 100%; max-width: 760px; text-align: center; }
  .badge-row { display: flex; justify-content: center; margin-bottom: 22px; }
  .cat-badge { color: #fff; font-weight: 600; font-size: 13px; padding: 5px 16px; border-radius: var(--radius-full); box-shadow: var(--shadow-sm); }
  .quote-body { opacity: 0; transform: translateY(6px); transition: opacity var(--duration-base) ease, transform var(--duration-base) ease; min-height: 150px;
    display: flex; flex-direction: column; justify-content: center; }
  .quote-body.in { opacity: 1; transform: none; }
  .quote-text { font-family: var(--font-display); font-weight: 600; line-height: 1.25; color: var(--color-text-primary); text-wrap: balance; }
  .quote-author { font-size: 22px; font-weight: 600; color: var(--color-primary-600); margin-top: 22px; }
  .quote-actions { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 22px; }
  .qa { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: none; border-radius: var(--radius-full);
    background: color-mix(in srgb, var(--color-surface) 60%, transparent); color: var(--color-text-secondary); box-shadow: var(--shadow-sm);
    transition: transform var(--duration-fast) ease, background var(--duration-fast) ease; }
  .qa:hover { transform: scale(1.08); background: var(--color-surface); }
  .qa-main { width: 46px; height: 46px; color: var(--color-text-primary); }
  .qa-fav { background: var(--color-error); color: #fff; }
  .qa-sep { width: 1px; height: 18px; background: var(--color-border); margin: 0 4px; }
  .views { font-size: 13px; color: var(--color-text-tertiary); margin-top: 18px; }

  /* Two column */
  .two-col { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  @media (max-width: 880px) { .two-col { grid-template-columns: 1fr; } }

  .card { background: color-mix(in srgb, var(--color-surface) 80%, transparent); backdrop-filter: blur(8px);
    border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 24px; }
  .card-head { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .card-head .grow { flex: 1; }
  .head-chip { display: inline-flex; padding: 9px; border-radius: var(--radius-md); background: var(--color-primary-100); }
  .card-title { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--color-text-primary); }
  .card-sub { font-size: 14px; color: var(--color-text-secondary); margin-top: 1px; }

  /* Goals */
  .goal-input-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .goal-input { flex: 1; padding: 12px 14px; border: 1px solid var(--color-border); border-radius: var(--radius-md);
    background: var(--color-surface-elevated); font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); outline: none; }
  .goal-input:focus { border-color: var(--color-primary-400); box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary-400) 30%, transparent); }
  .goal-input::placeholder { color: var(--color-text-tertiary); }
  .add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 0 18px; border: none; border-radius: var(--radius-md);
    background: var(--color-primary-300); color: #fff; font-family: var(--font-sans); font-weight: 600; font-size: 14px;
    transition: background var(--duration-fast) ease; }
  .add-btn:hover { background: var(--color-primary-400); }
  .progress-meta { display: flex; justify-content: space-between; font-size: 14px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .progress-count { font-weight: 500; }
  .progress-track { height: 8px; background: var(--color-divider); border-radius: var(--radius-full); overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: var(--color-primary-600); border-radius: var(--radius-full); transition: width var(--duration-slow) var(--ease-out); }
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task { display: flex; align-items: center; gap: 12px; padding: 12px; border: 2px solid var(--color-border); border-radius: var(--radius-md);
    background: var(--color-surface-elevated); text-align: left; transition: border-color var(--duration-fast) ease; }
  .task:hover { border-color: var(--color-primary-300); }
  .task-text { font-size: 15px; color: var(--color-text-primary); }
  .task.done { background: var(--color-surface-variant); }
  .task.done .task-text { color: var(--color-text-tertiary); text-decoration: line-through; }

  /* Reminders */
  .add-fab-sm { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: none;
    border-radius: var(--radius-md); background: var(--color-primary-600); box-shadow: var(--shadow-md); transition: background var(--duration-fast) ease; }
  .add-fab-sm:hover { background: var(--color-primary-700); }
  .rem-group { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--color-text-secondary); margin: 14px 0 8px; }
  .rem-group.overdue { color: var(--color-error); margin-top: 0; }
  .reminder { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--color-border);
    border-radius: var(--radius-md); background: var(--color-surface-elevated); }
  .rem-circle { width: 22px; height: 22px; border: 2px solid var(--color-border); border-radius: var(--radius-full); flex-shrink: 0; margin-top: 1px; }
  .rem-text { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .rem-meta { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text-secondary); margin-top: 3px; }
  .daily { display: inline-flex; align-items: center; gap: 4px; margin-left: 8px; color: var(--color-primary-600); font-weight: 600; }

  /* FAB */
  .add-fab { position: fixed; bottom: 28px; right: 28px; width: 56px; height: 56px; border: none; border-radius: var(--radius-full);
    background: var(--color-primary-600); box-shadow: var(--shadow-xl); display: inline-flex; align-items: center; justify-content: center;
    transition: background var(--duration-fast) ease, transform var(--duration-fast) ease; z-index: 40; }
  .add-fab:hover { background: var(--color-primary-700); transform: scale(1.06); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../_lib/icons.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
