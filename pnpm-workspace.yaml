packages:
  - apps/*
  - packages/*

# Supply-chain cooldown: ignore registry versions published < 14 days ago
# (20160 minutes), so a poisoned fresh publish has time to be caught/yanked.
# Internal @cuewise/* packages resolve via workspace:* and never hit the
# registry, so no exclude is needed (a scope-wildcard exclude would also let a
# malicious public @cuewise/* publish bypass the cooldown).
minimumReleaseAge: 20160
# TypeScript is a high-profile, heavily-scrutinized Microsoft package; exempt it from
# the cooldown so we can adopt a fresh major without waiting. TS 7 (the native compiler)
# also ships per-platform binaries under @typescript/*, which need the same exemption.
minimumReleaseAgeExclude:
  - typescript
  - '@typescript/*'

# Force patched versions of transitive deps flagged by Dependabot. Major-scoped
# so unrelated majors are untouched. All targets are >14 days old, so they clear
# the minimumReleaseAge cooldown above.
overrides:
  undici@7: 7.24.0
  ws@8: 8.20.1
  lodash@4: 4.18.0
  minimatch@5: 5.1.8
  minimatch@9: 9.0.7
  flatted@3: 3.4.2
  fast-uri@3: 3.1.2
  brace-expansion@2: 2.0.3
  picomatch@4: 4.0.4

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

catalog:
  '@astrojs/check': ^0.9.4
  '@astrojs/sitemap': ^3.2.0
  '@biomejs/biome': ^2.3.5
  '@cloudflare/vitest-pool-workers': ^0.18.0
  '@cloudflare/workers-types': ^4.20250620.0
  '@crxjs/vite-plugin': ^2.5.0
  '@tailwindcss/postcss': ^4.1.18
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.1
  '@testing-library/user-event': ^14.5.2
  '@types/chrome': ^0.1.32
  '@types/node': ^24.13.2
  '@types/react': ^18.3.26
  '@types/react-dom': ^18.3.7
  '@vitejs/plugin-react': ^5.1.2
  '@vitest/ui': 4.1.9
  astro: 6.4.6
  autoprefixer: ^10.4.23
  clsx: ^2.1.1
  date-fns: ^4.4.0
  fishery: ^2.4.0
  hono: ^4.7.0
  jose: ^6.0.10
  jsdom: ^29.1.1
  lucide-react: ^0.553.0
  postcss: ^8.5.15
  react: ^18.3.1
  react-dom: ^18.3.1
  recharts: 3.8.1
  sharp: ^0.34.0
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.1.18
  turbo: ^2.6.1
  typescript: ^7.0.2
  vite: ^6.4.3
  vitest: 4.1.9
  wrangler: ^4.20.0
  zustand: 5.0.14

catalogs:
  # Astro's check tooling (@astrojs/check) peer-caps at TS 6, so the standalone website
  # stays on 6 here until it supports TS 7; everything else uses the default catalog (7.x).
  astro-ts6:
    typescript: ^6.0.3
