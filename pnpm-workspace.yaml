packages:
  - apps/*
  - packages/*

# Supply-chain cooldown: ignore registry versions published < 14 days ago
# (20160 minutes), so a poisoned fresh publish has time to be caught/yanked.
# Internal @cuewise/* packages resolve via workspace:* and never hit the
# registry, so no exclude is needed (a scope-wildcard exclude would also let a
# malicious public @cuewise/* publish bypass the cooldown).
minimumReleaseAge: 20160

# Force patched versions of transitive deps flagged by Dependabot. Major-scoped
# so unrelated majors are untouched. All targets are >14 days old, so they clear
# the minimumReleaseAge cooldown above.
overrides:
  undici@7: 7.24.0
  ws@8: 8.20.1
  lodash@4: 4.18.0
  minimatch@5: 5.1.8
  minimatch@9: 9.0.7
  rollup@2: 2.80.0
  flatted@3: 3.4.2
  fast-uri@3: 3.1.2
  brace-expansion@2: 2.0.3
  picomatch@4: 4.0.4

allowBuilds:
  esbuild: true

catalog:
  '@biomejs/biome': ^2.3.5
  '@crxjs/vite-plugin': ^2.3.0
  '@tailwindcss/postcss': ^4.1.18
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.1
  '@testing-library/user-event': ^14.5.2
  '@types/chrome': ^0.1.32
  '@types/react': ^18.3.26
  '@types/react-dom': ^18.3.7
  '@vitejs/plugin-react': ^5.1.2
  '@vitest/ui': ^3.2.0
  autoprefixer: ^10.4.23
  clsx: ^2.1.1
  date-fns: ^4.1.0
  fishery: ^2.4.0
  jsdom: ^25.0.1
  lucide-react: ^0.553.0
  postcss: ^8.5.15
  react: ^18.3.1
  react-dom: ^18.3.1
  recharts: 2.15.4
  tailwind-merge: ^3.4.0
  tailwindcss: ^4.1.18
  turbo: ^2.6.1
  typescript: ^5.9.3
  vite: ^6.4.2
  vitest: 3.2.4
  zustand: 5.0.8
